<svg font-family="Pretendard, 'Noto Sans KR', -apple-system, sans-serif" viewBox="0 0 1120 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Attribute Form은 Hard Filter를 거쳐 후보 풀이 되고, 자연어 질의는 임베딩되어, 후보 풀과 질의가 유사도 검색에 함께 들어간다. OfferingProfile은 검색 벡터와 추천 근거의 이중 역할로 쓰인다. 유사도 검색이 상위 5개를 뽑으면 추천을 생성하고, 후속 질의는 tool calling으로 원문을 조회해 답한다">
